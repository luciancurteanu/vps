---
- name: VPS Complete Setup
  hosts: all
  become: true
  gather_facts: true
  vars_files:
    - ../vars/secrets.yml

  pre_tasks:
    - name: Update package cache
      tags: ['setup']
      ansible.builtin.dnf:
        update_cache: true
      changed_when: false
      when: ansible_os_family == "RedHat"
    - name: Set hostname
      tags: ['setup']
      ansible.builtin.hostname:
        name: "{{ domain }}"
      when: domain is defined

    - name: Create domain home directory structure
      tags: ['setup']
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
      loop:
        - "/home/{{ domain }}"
      when:
        - domain is defined
        - (domain.split('.')[0] != 'cpanel')

    - name: Create system user for master domain
      tags: ['setup']
      ansible.builtin.user:
        name: "{{ user }}"
        comment: "Owner of {{ domain }}"
        create_home: true
        home: "/home/{{ domain }}"
        shell: /bin/bash
        password: "{{ vault_domain_user_password | default(omit) | password_hash('sha512') }}"
        update_password: on_create
      when:
        - user is defined
        - user != ''
        - domain.split('.')[0] != 'cpanel'

    - name: Create domain directory structure with correct ownership
      tags: ['setup']
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "/home/{{ domain }}",            mode: '0755' }
        - { path: "/home/{{ domain }}/public_html", mode: '0755' }
        - { path: "/home/{{ domain }}/logs",        mode: '2775' }
        - { path: "/home/{{ domain }}/backup",      mode: '0750' }
        - { path: "/home/{{ domain }}/tmp",         mode: '0700' }
      when:
        - domain is defined
        - user is defined
        - domain.split('.')[0] != 'cpanel'

    - name: Pre-create nginx access log for fail2ban badbot jail
      tags: ['setup']
      ansible.builtin.file:
        path: "/home/{{ domain }}/logs/access.log"
        state: touch
        owner: "{{ user }}"
        group: "{{ user }}"
        mode: '0664'
        access_time: preserve
        modification_time: preserve
      when:
        - domain is defined
        - user is defined
        - domain.split('.')[0] != 'cpanel'

    - name: Set SELinux fcontext rule for domain logs directory
      tags: ['setup', 'selinux']
      community.general.sefcontext:
        target: "/home/{{ domain }}/logs(/.*)?"
        setype: httpd_log_t
        state: present
      when:
        - domain is defined
        - ansible_selinux is defined
        - ansible_selinux.status == "enabled"

    - name: Apply SELinux context to domain logs directory
      tags: ['setup', 'selinux']
      ansible.builtin.command: restorecon -Rv /home/{{ domain }}/logs
      when:
        - domain is defined
        - ansible_selinux is defined
        - ansible_selinux.status == "enabled"
      changed_when: false

    - name: Validate required variables
      tags: ['setup']
      ansible.builtin.fail:
        msg: "Required variable '{{ item }}' is not defined"
      when: vars[item] is not defined
      loop:
        - "domain"
        # Add other essential variables
  roles:
    # 1. Base system configuration
    - role: common
      tags: ['common', 'setup']
    
    # 2. Security hardening (depends on: common)
    - role: security
      tags: ['security', 'setup']
    
    # 3. Web server (needed by: php, mail/roundcube, webmin proxy)
    - role: nginx
      tags: ['nginx', 'web', 'setup']

    # 4. PHP processor (depends on: nginx; needed by: mail/roundcube)
    - role: php
      tags: ['php', 'web', 'setup']

    # 5. Database server (needed by: mail/roundcube)
    - role: mariadb
      tags: ['mariadb', 'database', 'setup']

    # 6. Mail server with Roundcube (depends on: nginx, php, mariadb)
    - role: mail
      tags: ['mail', 'setup']
      when: install_mail | default(false)

    # 7. Control panels (depend on: nginx for proxy)
    - role: webmin
      tags: ['webmin', 'control_panel', 'setup']
      when: install_webmin | default(true)

    - role: cockpit
      tags: ['cockpit', 'control_panel', 'setup']
      when: install_cockpit | default(false)  # Disabled by default (webmin is primary control panel)

    # 8. Additional services (no critical dependencies)
    - role: python
      tags: ['python', 'scraping', 'setup']

    - role: goproxy
      tags: ['goproxy', 'proxy', 'setup']
      when: install_goproxy | default(true)

    # 9. Development tools (optional, last)
    - role: development
      tags: ['development', 'setup']
      when: install_development_tools | default(false)

  post_tasks:
    - name: Ensure SFTP group exists
      tags: ['setup', 'sftp']
      ansible.builtin.group:
        name: sftp
        state: present
      when: domain is defined

    - name: Add master domain user to SFTP group
      tags: ['setup', 'sftp']
      ansible.builtin.user:
        name: "{{ user }}"
        groups: sftp
        append: true
      when:
        - domain is defined
        - user is defined

    - name: Configure per-user SFTP chroot in SSH
      tags: ['setup', 'sftp']
      ansible.builtin.blockinfile:
        path: /etc/ssh/sshd_config
        insertafter: EOF
        block: |
          Match User {{ user }}
          ChrootDirectory /home/{{ domain }}
        marker: "# {mark} ANSIBLE MANAGED SFTP CHROOT {{ domain }}"
      notify: Restart SSH
      when:
        - domain is defined
        - user is defined

    - name: Set master domain user umask to 0002 (group-writable files)
      tags: ['setup', 'nginx']
      ansible.builtin.lineinfile:
        path: "/home/{{ domain }}/.bashrc"
        line: "umask 0002"
        regexp: "^umask"
        create: false
      when:
        - domain is defined
        - user is defined

    - name: Add nginx to domain user group for log access
      tags: ['setup', 'nginx']
      ansible.builtin.user:
        name: nginx
        groups: "{{ user }}"
        append: true
      when:
        - domain is defined
        - user is defined

    - name: Add admin to domain user group for file access
      tags: ['setup', 'nginx']
      ansible.builtin.user:
        name: "{{ admin_user | default('admin') }}"
        groups: "{{ user }}"
        append: true
      when:
        - domain is defined
        - user is defined

    - name: Create main domain vhost configuration
      tags: ['setup', 'nginx']
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/nginx/vhost.conf.j2"
        dest: "/etc/nginx/sites-available/{{ domain }}.conf"
        owner: root
        group: root
      vars:
        vhost_domain: "{{ domain }}"
        vhost_root: "/home/{{ domain }}/public_html"
        vhost_user: "{{ domain_user | default(domain.split('.')[0]) }}"
        nginx_ssl_enabled: false
      when: domain is defined
      notify: Restart Nginx

    - name: Enable main domain vhost
      tags: ['setup', 'nginx']
      ansible.builtin.file:
        src: "/etc/nginx/sites-available/{{ domain }}.conf"
        dest: "/etc/nginx/sites-enabled/{{ domain }}.conf"
        state: link
      when: domain is defined
      notify: Restart Nginx

    - name: Create home directory with root ownership for SFTP chroot
      tags: ['setup', 'nginx']
      ansible.builtin.file:
        path: "/home/{{ domain }}"
        state: directory
        owner: root
        group: "{{ user | default(domain.split('.')[-2]) }}"
        mode: '0750'
      when: domain is defined

    - name: Create main domain public_html directory
      tags: ['setup', 'nginx']
      ansible.builtin.file:
        path: "/home/{{ domain }}/public_html"
        state: directory
        owner: "{{ user | default(domain.split('.')[-2]) }}"
        group: "{{ user | default(domain.split('.')[-2]) }}"
        mode: '0770'
      when: domain is defined

    - name: Create default index.html for main domain
      tags: ['setup', 'nginx']
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/website/index.html.j2"
        dest: "/home/{{ domain }}/public_html/index.html"
        owner: "{{ user | default(domain.split('.')[-2]) }}"
        group: "{{ user | default(domain.split('.')[-2]) }}"
        mode: '0664'
        force: true
      when: domain is defined

    - name: Set SELinux context for domain logs directory
      tags: ['setup', 'nginx', 'selinux']
      community.general.sefcontext:
        target: "/home/{{ domain }}/logs(/.*)?"
        setype: httpd_log_t
        state: present
      when:
        - domain is defined
        - ansible_selinux.status is defined
        - ansible_selinux.status == "enabled"

    - name: Apply SELinux context to domain logs
      tags: ['setup', 'nginx', 'selinux']
      ansible.builtin.command: restorecon -Rv /home/{{ domain }}/logs
      when:
        - domain is defined
        - ansible_selinux.status is defined
        - ansible_selinux.status == "enabled"
      changed_when: false

    - name: Set SELinux context for domain public_html directory
      tags: ['setup', 'nginx', 'selinux']
      community.general.sefcontext:
        target: "/home/{{ domain }}/public_html(/.*)?"
        setype: httpd_sys_content_t
        state: present
      when:
        - domain is defined
        - ansible_selinux.status is defined
        - ansible_selinux.status == "enabled"

    - name: Apply SELinux context to domain public_html
      tags: ['setup', 'nginx', 'selinux']
      ansible.builtin.command: restorecon -Rv /home/{{ domain }}/public_html
      when:
        - domain is defined
        - ansible_selinux.status is defined
        - ansible_selinux.status == "enabled"
      changed_when: false

    - name: Set ownership for domain logs directory
      tags: ['setup', 'nginx']
      ansible.builtin.file:
        path: "/home/{{ domain }}/logs"
        owner: "{{ user | default(domain.split('.')[-2]) }}"
        group: "{{ user | default(domain.split('.')[-2]) }}"
        mode: '2775'
        state: directory
      when: domain is defined

    - name: Pre-create nginx log files for domain
      tags: ['setup', 'nginx']
      ansible.builtin.file:
        path: "/home/{{ domain }}/logs/{{ item }}"
        state: touch
        owner: nginx
        group: "{{ user | default(domain.split('.')[-2]) }}"
        mode: '0664'
        access_time: preserve
        modification_time: preserve
      loop: "{{ _nginx_log_files }}"
      vars:
        _nginx_log_files: >-
          {{ ['access.log', 'error.log']
             + ([webmin_subdomain.split('.')[0] + '-access.log', webmin_subdomain.split('.')[0] + '-error.log']
                if install_webmin | default(true) else [])
             + ([mail_subdomain.split('.')[0] + '-access.log', mail_subdomain.split('.')[0] + '-error.log']
                if install_mail | default(false) else []) }}
      when: domain is defined

    - name: Ensure firewall is running
      tags: ['setup']
      ansible.builtin.service:
        name: "{{ firewall_service }}"
        state: started
        enabled: true
      when: firewall_enabled | default(true)

    - name: Verify all services are running
      tags: ['setup']
      ansible.builtin.command: systemctl status {{ item }}
      register: service_status
      changed_when: false
      failed_when: false
      loop:
        - nginx
        - php-fpm
        - mariadb
        - postfix
        - dovecot

    - name: Display service status
      tags: ['setup']
      ansible.builtin.debug:
        msg: "Service check results: {{ service_status.results | map(attribute='stdout') | list }}"

    - name: Setup complete notification
      tags: ['setup']
      ansible.builtin.debug:
        msg: "VPS setup completed successfully for {{ domain }}. Server is ready to use."

  handlers:
    - name: Restart Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted

    - name: Restart SSH
      ansible.builtin.service:
        name: sshd
        state: restarted
