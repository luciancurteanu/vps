---
- name: Manage SSL Certificates
  hosts: all
  become: true
  gather_facts: true

  vars_files:
    - ../vars/secrets.yml

  vars:
    required_vars:
      - domain
    certbot_dns_plugin: "certbot-dns-dynu"
    dynu_credentials_file: "/etc/letsencrypt/dynu-credentials.ini"
    force_renewal: false
    email: "webmaster@{{ domain }}"
    # Detect dev (.test) vs prod domain automatically.
    # Prefer explicit mail_use_letsencrypt variable when set: if mail_use_letsencrypt is false => dev.
    is_dev_domain: "{{ (mail_use_letsencrypt is defined and (not mail_use_letsencrypt)) or (domain.split('.')[-1] == 'test') }}"
    ssl_local_dir: "/etc/ssl/local/{{ domain }}"
    # Cert paths — resolved based on domain TLD
    ssl_cert_file: "{{ ssl_local_dir + '/server.crt' if is_dev_domain else '/etc/letsencrypt/live/' + domain + '/fullchain.pem' }}"
    ssl_cert_key: "{{ ssl_local_dir + '/server.key' if is_dev_domain else '/etc/letsencrypt/live/' + domain + '/privkey.pem' }}"
    ssl_ca_file: "{{ ssl_local_dir + '/ca.crt' if is_dev_domain else '/etc/letsencrypt/live/' + domain + '/chain.pem' }}"
    #cert_renewal_alert_email: "{{ email }}"
    cert_renewal_alert_email: "evpscloud@gmail.com"
  pre_tasks:
    - name: Verify required variables are defined
      ansible.builtin.assert:
        that: "{{ item }} is defined"
        fail_msg: "Required variable '{{ item }}' is not defined"
      loop: "{{ required_vars }}"

    - name: Check if domain exists in Nginx
      ansible.builtin.stat:
        path: "/etc/nginx/sites-available/{{ domain }}.conf"
      register: nginx_conf

    - name: Fail if domain doesn't exist in Nginx
      ansible.builtin.fail:
        msg: "Domain {{ domain }} is not configured in Nginx. Please create the virtual host first."
      when: not nginx_conf.stat.exists

  tasks:
    # ── DEV / .test: local CA-signed cert with SAN ─────────────────────────────

    - name: Create local SSL directory
      ansible.builtin.file:
        path: "{{ ssl_local_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      when: is_dev_domain

    - name: Generate local CA private key
      ansible.builtin.command:
        argv: [openssl, genrsa, -out, "{{ ssl_local_dir }}/ca.key", "4096"]
        creates: "{{ ssl_local_dir }}/ca.key"
      when: is_dev_domain

    - name: Protect CA private key
      ansible.builtin.file:
        path: "{{ ssl_local_dir }}/ca.key"
        owner: root
        group: root
        mode: '0600'
      when: is_dev_domain

    - name: Generate local CA certificate
      ansible.builtin.command:
        argv:
          - openssl
          - req
          - -new
          - -x509
          - -days
          - "3650"
          - -key
          - "{{ ssl_local_dir }}/ca.key"
          - -out
          - "{{ ssl_local_dir }}/ca.crt"
          - -subj
          - "/CN=Local Dev CA/O={{ domain }}"
        creates: "{{ ssl_local_dir }}/ca.crt"
      when: is_dev_domain

    - name: Generate server private key
      ansible.builtin.command:
        argv: [openssl, genrsa, -out, "{{ ssl_local_dir }}/server.key", "2048"]
        creates: "{{ ssl_local_dir }}/server.key"
      when: is_dev_domain

    - name: Write OpenSSL SAN config
      ansible.builtin.copy:
        dest: "{{ ssl_local_dir }}/san.cnf"
        owner: root
        group: root
        mode: '0644'
        content: |
          [req]
          distinguished_name = req_distinguished_name
          [req_distinguished_name]
          [v3_req]
          subjectAltName = DNS:{{ domain }},DNS:*.{{ domain }}
          basicConstraints = CA:FALSE
          keyUsage = critical, digitalSignature, keyEncipherment
          extendedKeyUsage = serverAuth
          authorityKeyIdentifier = keyid,issuer
      when: is_dev_domain
      register: san_cnf_result

    - name: Remove stale server cert when SAN config changes
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ ssl_local_dir }}/server.crt"
        - "{{ ssl_local_dir }}/server.csr"
      when: is_dev_domain and san_cnf_result.changed

    - name: Generate server CSR
      ansible.builtin.command:
        argv:
          - openssl
          - req
          - -new
          - -key
          - "{{ ssl_local_dir }}/server.key"
          - -out
          - "{{ ssl_local_dir }}/server.csr"
          - -subj
          - "/CN={{ domain }}"
        creates: "{{ ssl_local_dir }}/server.csr"
      when: is_dev_domain

    - name: Sign server certificate with local CA
      ansible.builtin.command:
        argv:
          - openssl
          - x509
          - -req
          - -days
          - "3650"
          - -in
          - "{{ ssl_local_dir }}/server.csr"
          - -CA
          - "{{ ssl_local_dir }}/ca.crt"
          - -CAkey
          - "{{ ssl_local_dir }}/ca.key"
          - -CAcreateserial
          - -out
          - "{{ ssl_local_dir }}/server.crt"
          - -extfile
          - "{{ ssl_local_dir }}/san.cnf"
          - -extensions
          - v3_req
        creates: "{{ ssl_local_dir }}/server.crt"
      when: is_dev_domain
      notify: Reload Nginx

    - name: Set permissions on server cert and key
      ansible.builtin.file:
        path: "{{ item.path }}"
        owner: root
        group: root
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ ssl_local_dir }}/server.crt", mode: '0644' }
        - { path: "{{ ssl_local_dir }}/server.key", mode: '0640' }
        - { path: "{{ ssl_local_dir }}/ca.crt",     mode: '0644' }
      when: is_dev_domain

    - name: Fetch local CA cert to controller (import into browser/OS to get green HTTPS)
      ansible.builtin.fetch:
        src: "{{ ssl_local_dir }}/ca.crt"
        dest: "{{ playbook_dir }}/../temp/{{ domain }}-local-ca.crt"
        flat: true
      when: is_dev_domain

    # ── PROD: Let's Encrypt via certbot + Dynu DNS ─────────────────────────────

    - name: Assert vault_dynu_api_token is defined and non-empty
      ansible.builtin.assert:
        that:
          - vault_dynu_api_token is defined
          - vault_dynu_api_token | length > 0
        fail_msg: "vault_dynu_api_token is missing or empty in vars/secrets.yml — cannot obtain Let's Encrypt certificate"
      when: not is_dev_domain

    - name: Add mail and cpanel CNAME records when this is the master domain
      ansible.builtin.set_fact:
        dynu_desired_records: >-
          {{ (dynu_desired_records | default([])) + [
            {'hostname': 'mail', 'type': 'CNAME', 'ttl': 3600, 'host': domain},
            {'hostname': 'cpanel', 'type': 'CNAME', 'ttl': 3600, 'host': domain}
          ] }}
      when: not is_dev_domain and domain == master_domain

    - name: Install python3-pip and venv (RedHat/CentOS)
      ansible.builtin.dnf:
        name: [python3-pip, python3-virtualenv]
        state: present
      when: not is_dev_domain and ansible_os_family == "RedHat"

    - name: Install python3-pip and venv (Debian/Ubuntu)
      ansible.builtin.apt:
        name: [python3-pip, python3-venv]
        state: present
      when: not is_dev_domain and ansible_os_family == "Debian"

    - name: Install certbot and certbot-dns-dynu into isolated virtualenv
      ansible.builtin.pip:
        name:
          - certbot
          - "{{ certbot_dns_plugin }}"
        state: present
        virtualenv: /opt/certbot-venv
        virtualenv_command: python3 -m venv
      when: not is_dev_domain

    - name: Symlink certbot from venv onto PATH
      ansible.builtin.stat:
        path: /opt/certbot-venv/bin/certbot
      register: certbot_venv_bin
      when: not is_dev_domain

    - name: Create symlink to certbot if venv binary exists
      ansible.builtin.file:
        src: /opt/certbot-venv/bin/certbot
        dest: /usr/local/bin/certbot
        state: link
        force: true
      when: not is_dev_domain and certbot_venv_bin.stat.exists | default(false)

    - name: Create Dynu credentials file
      ansible.builtin.copy:
        dest: "{{ dynu_credentials_file }}"
        content: "dns_dynu_auth_token = {{ vault_dynu_api_token }}\n"
        owner: root
        group: root
        mode: '0600'
      when: not is_dev_domain

    - name: Check if certificate already exists
      ansible.builtin.stat:
        path: "/etc/letsencrypt/live/{{ domain }}/fullchain.pem"
      register: cert_file
      when: not is_dev_domain

    - name: Build certbot domain list
      ansible.builtin.set_fact:
        certbot_domains: "{{ domain }},*.{{ domain }}"
      when: not is_dev_domain

    - name: Obtain SSL certificate
      ansible.builtin.command: >
        /usr/local/bin/certbot certonly
        --authenticator dns-dynu
        --dns-dynu-credentials {{ dynu_credentials_file }}
        --dns-dynu-propagation-seconds 60
        --non-interactive
        --agree-tos
        --email {{ email }}
        --domains {{ certbot_domains }}
        {{ '--force-renewal' if force_renewal else '' }}
      register: certbot_result
      when: not is_dev_domain and (not cert_file.stat.exists or force_renewal)

    - name: Stat certificate file after certbot run
      ansible.builtin.stat:
        path: "/etc/letsencrypt/live/{{ domain }}/fullchain.pem"
      register: cert_file_after
      when: not is_dev_domain and (not cert_file.stat.exists or force_renewal)

    - name: Fail if certbot did not produce certificate
      ansible.builtin.fail:
        msg: "Certbot run completed but certificate not found at /etc/letsencrypt/live/{{ domain }}/fullchain.pem"
      when: not is_dev_domain and (not cert_file.stat.exists or force_renewal) and not cert_file_after.stat.exists

    - name: Install cronjob for certificate renewal
      ansible.builtin.cron:
        name: "Certbot automatic renewal"
        job: >-
          /usr/local/bin/certbot renew --quiet --non-interactive ||
          { echo -e "From: root@$(hostname --fqdn)\nTo: {{ cert_renewal_alert_email | default(email) }}\nSubject: [ALERT] SSL Renewal Failed on $(hostname)\n\nCertbot renewal failed at $(date)" | /sbin/sendmail -t; }
        minute: "0"
        hour: "3"
        weekday: "1"  # Monday
      when: not is_dev_domain

    - name: Display certificate information
      ansible.builtin.command:
        argv: [/usr/local/bin/certbot, certificates, --cert-name, "{{ domain }}"]
      register: cert_info
      changed_when: false
      when: not is_dev_domain

    - name: Output certificate information
      ansible.builtin.debug:
        msg: "{{ cert_info.stdout_lines }}"
      when: not is_dev_domain

    # ── Dynu DNS: ensure DMARC, SPF and DKIM TXT records exist (prod only) ──
    - name: Ensure Dynu API token is present
      ansible.builtin.assert:
        that:
          - vault_dynu_api_token is defined
          - vault_dynu_api_token | length > 0
        fail_msg: "vault_dynu_api_token is required to manage DNS records via Dynu"
      when: not is_dev_domain

    - name: Lookup Dynu DNS services
      ansible.builtin.uri:
        url: "https://api.dynu.com/v2/dns"
        method: GET
        headers:
          API-Key: "{{ vault_dynu_api_token }}"
        return_content: yes
        status_code: 200
      register: dynu_dns_list
      when: not is_dev_domain

    - name: Find Dynu zone id for domain
      ansible.builtin.set_fact:
        dynu_zone_id: >-
          {{ ((dynu_dns_list.json | default([]) | selectattr('domainName','equalto', domain) | map(attribute='id') | list)
             + (dynu_dns_list.json | default([]) | selectattr('name','equalto', domain) | map(attribute='id') | list)).0 }}
      when: not is_dev_domain

    - name: Fail if Dynu zone not found for domain
      ansible.builtin.fail:
        msg: "Dynu DNS zone for '{{ domain }}' not found. Ensure the domain is present in your Dynu account."
      when: not is_dev_domain and (dynu_zone_id is not defined or dynu_zone_id == None)

    - name: Read DKIM TXT file into variable
      ansible.builtin.command: "cat /etc/opendkim/keys/{{ domain }}/default.txt"
      register: dkim_txt
      changed_when: false
      failed_when: dkim_txt.rc not in [0,1]
      when: not is_dev_domain

    - name: Normalize DKIM TXT value (remove parentheses, quotes and whitespace)
      ansible.builtin.set_fact:
        dkim_value: >-
          {{ dkim_txt.stdout | default('') | regex_replace('\\(|\\)','') | regex_replace('"','') | regex_replace('\\s+','') | trim }}
      when: not is_dev_domain

    - name: Prepare DNS TXT records list
      ansible.builtin.set_fact:
        dynu_desired_records: >-
          {{ (dynu_desired_records | default([])) + [
            {'hostname': '_dmarc', 'type': 'TXT', 'ttl': 3600, 'value': 'v=DMARC1; p=reject;'},
            {'hostname': '@', 'type': 'SPF', 'ttl': 3600, 'value': "v=spf1 a include:spf.protection.outlook.com include:_spf.google.com include:_spf.mail.yahoo.com -all"},
            {'hostname': 'default._domainkey', 'type': 'TXT', 'ttl': 120, 'value': dkim_value},
            {'hostname': 'www', 'type': 'CNAME', 'ttl': 3600, 'host': domain},
            {'hostname': '_smtp._tls', 'type': 'TXT', 'ttl': 3600, 'value': "v=TLSRPTv1; rua=mailto:contact@%s" % domain}
          ] }}
      when: not is_dev_domain

    - name: Get existing records for Dynu zone
      ansible.builtin.uri:
        url: "https://api.dynu.com/v2/dns/{{ dynu_zone_id }}/record"
        method: GET
        headers:
          API-Key: "{{ vault_dynu_api_token }}"
        return_content: yes
        status_code: 200
      register: dynu_zone_records
      when: not is_dev_domain

    - name: Update existing Dynu record if present
      ansible.builtin.uri:
        url: >-
          https://api.dynu.com/v2/dns/{{ dynu_zone_id }}/record/{{ (
            (dynu_zone_records.json | default([]) | selectattr('nodeName','equalto', ((item.hostname == '@') | ternary('', (item.hostname | regex_replace('\.' ~ domain ~ '$','')))) ) | map(attribute='id') | list)
            + (dynu_zone_records.json | default([]) | selectattr('hostname','equalto', ( ((item.hostname == '@') | ternary('', (item.hostname | regex_replace('\.' ~ domain ~ '$',''))) ) == '' and domain or (item.hostname | regex_replace('\.' ~ domain ~ '$','')) ~ '.' ~ domain) ) | map(attribute='id') | list)
          ).0 }}
        method: POST
        headers:
          API-Key: "{{ vault_dynu_api_token }}"
          Content-Type: "application/json"
        body: >-
          {{ (item.type == 'MX') | ternary(
              {'nodeName': ((item.hostname == '@') | ternary('', (item.hostname | regex_replace('\.' ~ domain ~ '$','')))), 'recordType': item.type, 'ttl': item.ttl, 'host': (item.host | default(item.value)), 'priority': (item.priority | default(10)), 'state': true},
              (item.type == 'CNAME') | ternary(
                {'nodeName': ((item.hostname == '@') | ternary('', (item.hostname | regex_replace('\.' ~ domain ~ '$','')))), 'recordType': item.type, 'ttl': item.ttl, 'host': (item.host | default(item.value)), 'state': true},
                {'nodeName': ((item.hostname == '@') | ternary('', (item.hostname | regex_replace('\.' ~ domain ~ '$','')))), 'recordType': item.type, 'ttl': item.ttl, 'textData': item.value, 'state': true}
              )
            ) }}
        body_format: json
        status_code: [200,201,204]
      loop: "{{ dynu_desired_records | default([]) }}"
      loop_control:
        loop_var: item
      when: not is_dev_domain and (
        ((dynu_zone_records.json | default([]) | selectattr('nodeName','equalto', ((item.hostname == '@') | ternary('', (item.hostname | regex_replace('\.' ~ domain ~ '$','')))) ) | map(attribute='id') | list)
         + (dynu_zone_records.json | default([]) | selectattr('hostname','equalto', ( ((item.hostname == '@') | ternary('', (item.hostname | regex_replace('\.' ~ domain ~ '$',''))) ) == '' and domain or (item.hostname | regex_replace('\.' ~ domain ~ '$','')) ~ '.' ~ domain) ) | map(attribute='id') | list)).0 is defined and (
        ((dynu_zone_records.json | default([]) | selectattr('nodeName','equalto', ((item.hostname == '@') | ternary('', (item.hostname | regex_replace('\.' ~ domain ~ '$','')))) ) | map(attribute='id') | list)
         + (dynu_zone_records.json | default([]) | selectattr('hostname','equalto', ( ((item.hostname == '@') | ternary('', (item.hostname | regex_replace('\.' ~ domain ~ '$',''))) ) == '' and domain or (item.hostname | regex_replace('\.' ~ domain ~ '$','')) ~ '.' ~ domain) ) | map(attribute='id') | list)).0 != None )

    - name: Create Dynu record when missing
      ansible.builtin.uri:
        url: "https://api.dynu.com/v2/dns/{{ dynu_zone_id }}/record"
        method: POST
        headers:
          API-Key: "{{ vault_dynu_api_token }}"
          Content-Type: "application/json"
        body: >-
          {{ (item.type == 'MX') | ternary(
              {'nodeName': ((item.hostname == '@') | ternary('', (item.hostname | regex_replace('\.' ~ domain ~ '$','')))), 'recordType': item.type, 'ttl': item.ttl, 'host': (item.host | default(item.value)), 'priority': (item.priority | default(10)), 'state': true},
              (item.type == 'CNAME') | ternary(
                {'nodeName': ((item.hostname == '@') | ternary('', (item.hostname | regex_replace('\.' ~ domain ~ '$','')))), 'recordType': item.type, 'ttl': item.ttl, 'host': (item.host | default(item.value)), 'state': true},
                {'nodeName': ((item.hostname == '@') | ternary('', (item.hostname | regex_replace('\.' ~ domain ~ '$','')))), 'recordType': item.type, 'ttl': item.ttl, 'textData': item.value, 'state': true}
              )
            ) }}
        body_format: json
        status_code: [200,201]
      loop: "{{ dynu_desired_records | default([]) }}"
      loop_control:
        loop_var: item
      when: not is_dev_domain and (
        ((dynu_zone_records.json | default([]) | selectattr('nodeName','equalto', ((item.hostname == '@') | ternary('', (item.hostname | regex_replace('\.' ~ domain ~ '$','')))) ) | map(attribute='id') | list)
         + (dynu_zone_records.json | default([]) | selectattr('hostname','equalto', ( ((item.hostname == '@') | ternary('', (item.hostname | regex_replace('\.' ~ domain ~ '$',''))) ) == '' and domain or (item.hostname | regex_replace('\.' ~ domain ~ '$','')) ~ '.' ~ domain) ) | map(attribute='id') | list)).0 is not defined or (
        ((dynu_zone_records.json | default([]) | selectattr('nodeName','equalto', ((item.hostname == '@') | ternary('', (item.hostname | regex_replace('\.' ~ domain ~ '$','')))) ) | map(attribute='id') | list)
         + (dynu_zone_records.json | default([]) | selectattr('hostname','equalto', ( ((item.hostname == '@') | ternary('', (item.hostname | regex_replace('\.' ~ domain ~ '$',''))) ) == '' and domain or (item.hostname | regex_replace('\.' ~ domain ~ '$','')) ~ '.' ~ domain) ) | map(attribute='id') | list)).0 == None )

    # ── Shared: enable SSL in all nginx/app configs ─────────────────────────────

    - name: Update Nginx virtual host with SSL enabled
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/nginx/vhost.conf.j2"
        dest: "/etc/nginx/sites-available/{{ domain }}.conf"
        owner: root
        group: root
      vars:
        nginx_ssl_enabled: true
        nginx_ssl_cert: "{{ ssl_cert_file }}"
        nginx_ssl_key: "{{ ssl_cert_key }}"
      notify: Reload Nginx

    - name: Update mail subdomain nginx configuration with SSL enabled
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/mail/templates/nginx/mail.conf.j2"
        dest: "/etc/nginx/sites-available/{{ mail_subdomain }}.conf"
        owner: root
        group: root
      vars:
        mail_enable_ssl: true
        nginx_ssl_cert: "{{ ssl_cert_file }}"
        nginx_ssl_key: "{{ ssl_cert_key }}"
        nginx_ssl_ca: "{{ ssl_ca_file }}"
      when: install_mail | default(true)
      notify: Reload Nginx

    - name: Update Roundcube configuration for HTTPS
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/mail/templates/roundcube/config.inc.php.j2"
        dest: "{{ webmail_path }}/config/config.inc.php"
        owner: root
        group: root
        mode: '0644'
      vars:
        mail_enable_ssl: true
      when: install_mail | default(true) and domain == master_domain

    - name: Check if Postfix main.cf exists
      ansible.builtin.stat:
        path: /etc/postfix/main.cf
      register: postfix_maincf_stat
      when: install_mail | default(true) and domain == master_domain

    - name: Check if Postfix header_checks exists
      ansible.builtin.stat:
        path: /etc/postfix/header_checks
      register: postfix_header_checks_stat
      when:
        - install_mail | default(true)
        - domain == master_domain
        - postfix_maincf_stat.stat.exists | default(false)

    - name: Backup original Postfix header_checks
      ansible.builtin.copy:
        src: /etc/postfix/header_checks
        dest: /etc/postfix/header_checks.bak
        remote_src: true
        mode: '0644'
        force: false
      when:
        - install_mail | default(true)
        - domain == master_domain
        - postfix_maincf_stat.stat.exists | default(false)
        - postfix_header_checks_stat.stat.exists | default(false)

    - name: Create Postfix header_checks when missing
      ansible.builtin.copy:
        dest: /etc/postfix/header_checks
        content: ""
        owner: root
        group: root
        mode: '0644'
        force: false
      when:
        - install_mail | default(true)
        - domain == master_domain
        - postfix_maincf_stat.stat.exists | default(false)

    - name: Add custom spam header/body checks
      ansible.builtin.blockinfile:
        path: /etc/postfix/header_checks
        marker: "# {mark} ANSIBLE MANAGED CUSTOM HEADER CHECKS"
        insertafter: EOF
        block: |
          #/^X-Mailer:/    IGNORE
          #/^From:.*name@.*/ REJECT
          #/^Subject:.*Re: your photos.*/ REJECT
          #/^Subject:.*Re: Special invitation.*/ REJECT
          #/^Received:.*(\(unknown).*/ REJECT
          #body
          #/(crypto|bit coin|hаckеr|malwаre|bitcоin|\.jp(?!g)|\.ru)/gi REJECT
          # regexp-table active equivalents (Postfix without pcre support)
          /^Received:.*\(unknown.*/ REJECT
          /(crypto|bit coin|hаckеr|malwаre|bitcоin|\.jp([^g]|$)|\.ru)/i REJECT
      when:
        - install_mail | default(true)
        - domain == master_domain
        - postfix_maincf_stat.stat.exists | default(false)
      notify: Restart Postfix

    - name: Remove malformed Postfix nheader_checks entry if present
      ansible.builtin.lineinfile:
        path: /etc/postfix/main.cf
        regexp: '^nheader_checks\s*='
        state: absent
      when:
        - install_mail | default(true)
        - domain == master_domain
        - postfix_maincf_stat.stat.exists | default(false)

    - name: Ensure Postfix main.cf has trailing blank line before postconf edits
      ansible.builtin.lineinfile:
        path: /etc/postfix/main.cf
        insertafter: EOF
        line: ""
      when:
        - install_mail | default(true)
        - domain == master_domain
        - postfix_maincf_stat.stat.exists | default(false)

    - name: Enforce canonical smtp TLS settings in Postfix
      ansible.builtin.command:
        argv:
          - postconf
          - -e
          - "{{ item }}"
      loop:
        - "smtp_use_tls=yes"
        - "smtp_tls_security_level=may"
        - "smtp_tls_loglevel=1"
        - "smtp_tls_session_cache_database=btree:${data_directory}/smtp_scache"
        - "smtp_tls_cert_file={{ ssl_cert_file }}"
        - "smtp_tls_key_file={{ ssl_cert_key }}"
        - "smtp_tls_CAfile={{ ssl_ca_file }}"
        - "header_checks=regexp:/etc/postfix/header_checks"
      when:
        - install_mail | default(true)
        - domain == master_domain
        - postfix_maincf_stat.stat.exists | default(false)
        - cert_file.stat.exists | default(false)
      notify: Restart Postfix

    - name: Update Webmin nginx proxy configuration with SSL enabled
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/webmin/templates/nginx/webmin.conf.j2"
        dest: "/etc/nginx/sites-available/{{ webmin_subdomain }}.conf"
        owner: root
        group: root
      vars:
        webmin_ssl_enabled: true
        nginx_ssl_cert: "{{ ssl_cert_file }}"
        nginx_ssl_key: "{{ ssl_cert_key }}"
      when: install_webmin | default(true)
      notify: Reload Nginx

    - name: Update Dovecot SSL configuration
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../roles/mail/templates/dovecot/conf.d/10-ssl.conf.j2"
        dest: /etc/dovecot/conf.d/10-ssl.conf
        owner: root
        group: root
        mode: '0640'
      vars:
        mail_ssl_enabled: true
        mail_ssl_cert: "{{ ssl_cert_file }}"
        mail_ssl_key: "{{ ssl_cert_key }}"
        mail_ssl_ca: "{{ ssl_ca_file }}"
      when: install_mail | default(true) and domain == master_domain and cert_file.stat.exists | default(false)
      notify: Restart Dovecot

    - name: Check if Webmin miniserv.conf exists
      ansible.builtin.stat:
        path: /etc/webmin/miniserv.conf
      register: webmin_miniconf_stat
      when: install_webmin | default(true)

    - name: Enable SSL enforcement in Webmin
      ansible.builtin.lineinfile:
        path: /etc/webmin/miniserv.conf
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^ssl_hsts=', line: 'ssl_hsts=1' }
        - { regexp: '^ssl_enforce=', line: 'ssl_enforce=2' }
      when: install_webmin | default(true) and (webmin_miniconf_stat.stat.exists | default(false))
      notify: Restart Webmin

  handlers:
    - name: Restart Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted

    - name: Reload Nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded

    - name: Restart Webmin
      ansible.builtin.service:
        name: webmin
        state: restarted

    - name: Restart Dovecot
      ansible.builtin.service:
        name: dovecot
        state: restarted

    - name: Restart Postfix
      ansible.builtin.service:
        name: postfix
        state: restarted
