---
- name: Remove Virtual Host
  hosts: all
  become: true
  gather_facts: true

  vars_files:
    - ../vars/secrets.yml

  vars:
    required_vars:
      - domain
      - user
    document_root: "/home/{{ domain }}"
    # cleanup defaults
    remove_user: true
    remove_hosts: true
    remove_db: true
    enforce_vhost_exists: false

  pre_tasks:
    - name: Verify required variables are defined
      ansible.builtin.assert:
        that: "{{ item }} is defined"
        fail_msg: "Required variable '{{ item }}' is not defined"
      loop: "{{ required_vars }}"

    - name: Check if virtual host exists
      ansible.builtin.stat:
        path: "/etc/nginx/sites-available/{{ domain }}.conf"
      register: nginx_conf
    - name: Fail if virtual host doesn't exist (disabled by default)
      ansible.builtin.fail:
        msg: "Virtual host for {{ domain }} does not exist. Set 'enforce_vhost_exists=true' to make this fail instead of continuing with cleanup."
      when: not nginx_conf.stat.exists and (enforce_vhost_exists | default(false))

  tasks:
    - name: Backup website files
      ansible.builtin.archive:
        path: "{{ document_root }}"
        dest: "/var/backups/{{ domain }}-{{ ansible_date_time.date }}.tar.gz"
        format: gz
      register: backup_result

    - name: Abort if backup failed
      ansible.builtin.fail:
        msg: "Backup failed for {{ domain }}. Aborting removal to prevent data loss. Use -e skip_backup=true to force."
      when:
        - not (skip_backup | default(false))
        - backup_result is failed or (backup_result.dest is not defined)

    - name: Remove Nginx virtual host configuration
      ansible.builtin.file:
        path: "/etc/nginx/sites-available/{{ domain }}.conf"
        state: absent
      notify: Reload Nginx

    - name: Remove Nginx site symlink
      ansible.builtin.file:
        path: "/etc/nginx/sites-enabled/{{ domain }}.conf"
        state: absent
      notify: Reload Nginx

    - name: Remove PHP-FPM pool configuration
      ansible.builtin.file:
        path: "/etc/php-fpm.d/{{ domain | replace('.', '_') }}.conf"
        state: absent
      notify: Restart PHP-FPM

    - name: Remove website files (with confirmation)
      ansible.builtin.file:
        path: "{{ document_root }}"
        state: absent
      when: remove_files | default(true)

    - name: Remove SSL certificates
      ansible.builtin.file:
        path: "/etc/letsencrypt/live/{{ domain }}"
        state: absent
      when: remove_ssl | default(true)
      failed_when: false

    - name: Stop php-fpm service before removing user (if applicable)
      ansible.builtin.service:
        name: php-fpm.service
        state: stopped
      ignore_errors: true
      when: remove_user | default(true)

    - name: Attempt graceful kill of processes owned by the user
      ansible.builtin.shell: "killall -u {{ user }} 2>/dev/null || true"
      ignore_errors: true
      when: remove_user | default(true)

    - name: Force kill remaining processes owned by the user
      ansible.builtin.shell: "killall -KILL -u {{ user }} 2>/dev/null || true"
      ignore_errors: true
      when: remove_user | default(true)

    - name: Kill any individual remaining PIDs for the user
      ansible.builtin.shell: |
        for p in $(pgrep -u {{ user }} || true); do
          kill -9 $p 2>/dev/null || true
        done
      ignore_errors: true
      when: remove_user | default(true)

    - name: Remove system user (optional) with SELinux fallback
      ansible.builtin.shell: |
        userdel -r -f {{ user }} 2>/dev/null || userdel -Z -r -f {{ user }} 2>/dev/null || true
      register: userdel_result
      failed_when: false
      when: remove_user | default(true)

    - name: Ensure /etc/passwd has no lingering entries for the user
      ansible.builtin.lineinfile:
        path: /etc/passwd
        regexp: '^{{ user }}:.*$'
        state: absent
        backup: yes
      when: remove_user | default(true)

    - name: Display backup information
      ansible.builtin.debug:
        msg: "Website backup created at: {{ backup_result.dest | default('Backup failed') }}"
      when: backup_result is defined

    - name: Remove domain entries from /etc/hosts
      ansible.builtin.replace:
        path: /etc/hosts
        regexp: '.*\b({{ domain }}|www\.{{ domain }}|mail\.{{ domain }}|cpanel\.{{ domain }})\b.*\n?'
        replace: ''
        backup: yes
      when: remove_hosts | default(true)

    - name: Remove OpenDKIM key directory for the domain
      ansible.builtin.file:
        path: "/etc/opendkim/keys/{{ domain }}"
        state: absent
      when: remove_opendkim | default(true)

    - name: Remove OpenDKIM KeyTable entries for domain
      ansible.builtin.replace:
        path: /etc/opendkim/KeyTable
        regexp: ".*\\b{{ domain }}\\b.*\n?"
        replace: ''
        backup: yes
      when: remove_opendkim | default(true)

    - name: Remove OpenDKIM SigningTable entries for domain
      ansible.builtin.replace:
        path: /etc/opendkim/SigningTable
        regexp: ".*\\b{{ domain }}\\b.*\n?"
        replace: ''
        backup: yes
      when: remove_opendkim | default(true)

    - name: Check for Postfix map files
      ansible.builtin.stat:
        path: "{{ item }}"
      register: postfix_map
      loop:
        - /etc/postfix/virtual
        - /etc/postfix/transport
      when: remove_postfix | default(true)

    - name: Remove domain entries from Postfix maps
      ansible.builtin.replace:
        path: "{{ item }}"
        regexp: ".*\\b{{ domain }}\\b.*\n?"
        replace: ''
        backup: yes
      loop:
        - /etc/postfix/virtual
        - /etc/postfix/transport
      when: remove_postfix | default(true)

    - name: Rebuild Postfix maps if present
      ansible.builtin.command:
        cmd: "postmap {{ item }}"
      loop:
        - /etc/postfix/virtual
        - /etc/postfix/transport
      when: remove_postfix | default(true)
      failed_when: false

    - name: Restart Postfix
      ansible.builtin.service:
        name: postfix
        state: restarted
      when: remove_postfix | default(true)

    - name: Attempt to remove Let's Encrypt certificate using certbot (if installed)
      ansible.builtin.command:
        cmd: "certbot delete --cert-name {{ domain }} --non-interactive --quiet"
      register: certbot_delete
      failed_when: false
      changed_when: certbot_delete.rc == 0
      when: remove_ssl | default(true)

    - name: Remove Let's Encrypt directories/files for domain
      ansible.builtin.file:
        path: "/etc/letsencrypt/{{ item }}"
        state: absent
      loop:
        - "live/{{ domain }}"
        - "archive/{{ domain }}"
        - "renewal/{{ domain }}.conf"
      when: remove_ssl | default(true)

    - name: Remove mail database entries for domain (users)
      community.mysql.mysql_query:
        login_db: "{{ mail_db_name | default('mailserver') }}"
        login_user: "{{ mail_db_user | default(omit) }}"
        login_password: "{{ mail_db_password | default(omit) }}"
        login_unix_socket: "{{ db_login_unix_socket | default(omit) }}"
        query: "DELETE FROM users WHERE domain=%s"
        positional_args:
          - "{{ domain }}"
      when: remove_db | default(true)

    - name: Remove mail database entries for domain (domains)
      community.mysql.mysql_query:
        login_db: "{{ mail_db_name | default('mailserver') }}"
        login_user: "{{ mail_db_user | default(omit) }}"
        login_password: "{{ mail_db_password | default(omit) }}"
        login_unix_socket: "{{ db_login_unix_socket | default(omit) }}"
        query: "DELETE FROM domains WHERE domain=%s"
        positional_args:
          - "{{ domain }}"
      when: remove_db | default(true)

    - name: Remove mail database entries for domain (aliases)
      community.mysql.mysql_query:
        login_db: "{{ mail_db_name | default('mailserver') }}"
        login_user: "{{ mail_db_user | default(omit) }}"
        login_password: "{{ mail_db_password | default(omit) }}"
        login_unix_socket: "{{ db_login_unix_socket | default(omit) }}"
        query: "DELETE FROM aliases WHERE destination LIKE CONCAT('%%@', %s) OR source LIKE CONCAT('%%@', %s)"
        positional_args:
          - "{{ domain }}"
          - "{{ domain }}"
      when: remove_db | default(true)

    - name: Remove Roundcube users for domain
      community.mysql.mysql_query:
        login_db: "{{ roundcube_db_name | default('roundcube') }}"
        login_user: "{{ roundcube_db_user | default(omit) }}"
        login_password: "{{ roundcube_db_password | default(vault_roundcube_db_password | default(omit)) }}"
        login_unix_socket: "{{ db_login_unix_socket | default(omit) }}"
        query: "DELETE FROM users WHERE username LIKE CONCAT('%%@', %s)"
        positional_args:
          - "{{ domain }}"
      when: remove_roundcube | default(true)

    - name: Remove Roundcube email entries from collected_addresses, contacts, identities
      community.mysql.mysql_query:
        login_db: "{{ roundcube_db_name | default('roundcube') }}"
        login_user: "{{ roundcube_db_user | default(omit) }}"
        login_password: "{{ roundcube_db_password | default(vault_roundcube_db_password | default(omit)) }}"
        login_unix_socket: "{{ db_login_unix_socket | default(omit) }}"
        query: "DELETE FROM {{ item }} WHERE email LIKE CONCAT('%%@', %s)"
        positional_args:
          - "{{ domain }}"
      loop:
        - collected_addresses
        - contacts
        - identities
      when: remove_roundcube | default(true)

    - name: Remove orphaned Roundcube rows referencing deleted users
      community.mysql.mysql_query:
        login_db: "{{ roundcube_db_name | default('roundcube') }}"
        login_user: "{{ roundcube_db_user | default(omit) }}"
        login_password: "{{ roundcube_db_password | default(vault_roundcube_db_password | default(omit)) }}"
        login_unix_socket: "{{ db_login_unix_socket | default(omit) }}"
        query: "DELETE FROM {{ item }} WHERE user_id IS NOT NULL AND user_id NOT IN (SELECT user_id FROM users)"
      loop:
        - cache
        - cache_index
        - cache_thread
        - cache_messages
        - contactgroups
        - responses
        - dictionary
        - searches
        - filestore
      when: remove_roundcube | default(true)

    - name: Find Dovecot config files that reference the domain
      ansible.builtin.shell: "grep -RIl --exclude-dir='conf.d' '{{ domain }}' /etc/dovecot || true"
      register: dovecot_match_files
      changed_when: false

    - name: Backup matched Dovecot files
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "{{ item }}.bak.vps_cleanup"
        remote_src: yes
      loop: "{{ dovecot_match_files.stdout_lines }}"
      when: dovecot_match_files.stdout_lines | length > 0 and remove_dovecot | default(true)

    - name: Remove matched Dovecot files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop: "{{ dovecot_match_files.stdout_lines }}"
      when: dovecot_match_files.stdout_lines | length > 0 and remove_dovecot | default(true)

    - name: Remove typical Dovecot maildirs for the domain
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/var/vmail/{{ domain }}"
        - "/var/mail/vhosts/{{ domain }}"
        - "/home/{{ user }}/Maildir"
      when: remove_dovecot | default(true)

    - name: Restart Dovecot
      ansible.builtin.service:
        name: dovecot
        state: restarted
      when: remove_dovecot | default(true)

  handlers:
    - name: Restart Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted

    - name: Reload Nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded

    - name: Restart PHP-FPM
      ansible.builtin.service:
        name: php-fpm.service
        state: restarted
