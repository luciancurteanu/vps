---
- name: Create Virtual Host
  hosts: all
  become: true
  gather_facts: true
  vars_files:
    - ../vars/secrets.yml
  vars:
    required_vars:
      - domain
      - user
    # When true, subdomains/other domains will reuse the master domain user
    # instead of creating a separate system user. Default: false (create per-domain users).
    reuse_master_user: false
    document_root: "/home/{{ domain }}/public_html"
    sftp_group: "sftp"
    # Mail/DB vars (defined in mail role defaults, needed here for standalone playbook)
    db_login_unix_socket: /var/lib/mysql/mysql.sock
    mail_user: vmail
    mail_group: vmail
    mail_db_name: mailserver
  pre_tasks:
    - name: Verify required variables are defined
      ansible.builtin.assert:
        that: "{{ item }} is defined"
        fail_msg: "Required variable '{{ item }}' is not defined"
      loop: "{{ required_vars }}"

    - name: Determine vhost owner
      ansible.builtin.set_fact:
        # If reuse_master_user is true and this is not the master domain, reuse master_domain_user.
        vhost_owner: "{{ (master_domain_user | default(master_domain.split('.')[0])) if (reuse_master_user | default(false)) and domain != master_domain else user }}"

    - name: Check if virtual host already exists
      ansible.builtin.stat:
        path: "/etc/nginx/sites-available/{{ domain }}.conf"
      register: nginx_conf

    - name: Fail if virtual host already exists
      ansible.builtin.fail:
        msg: "Virtual host for {{ domain }} already exists. Please remove it first if you want to recreate it."
      when: nginx_conf.stat.exists
  tasks:
    - name: Create system user for domain (unless reusing master user)
      ansible.builtin.user:
        name: "{{ user }}"
        comment: "Virtual host user for {{ domain }}"
        create_home: true
        home: "/home/{{ domain }}"
        shell: /bin/bash
        password: "{{ vault_domain_user_password | password_hash('sha512') }}"
        update_password: on_create
      when: ((domain == master_domain) or (not (reuse_master_user | default(false)))) and (domain.split('.')[0] != 'cpanel')

    - name: Set vhost user umask to 0002 (group-writable files)
      ansible.builtin.lineinfile:
        path: "/home/{{ domain }}/.bashrc"
        line: "umask 0002"
        regexp: "^umask"
        create: false
      when: ((domain == master_domain) or (not (reuse_master_user | default(false)))) and (domain.split('.')[0] != 'cpanel')

    - name: Add admin user to vhost group
      ansible.builtin.user:
        name: "{{ admin_user | default('admin') }}"
        groups: "{{ vhost_owner }}"
        append: true
      when: domain.split('.')[0] != 'cpanel'

    - name: Add nginx user to vhost group
      ansible.builtin.user:
        name: nginx
        groups: "{{ vhost_owner }}"
        append: true
      when: domain.split('.')[0] != 'cpanel'

    - name: Authorize admin SSH key for vhost user
      ansible.posix.authorized_key:
        user: "{{ user }}"
        state: present
        key: "{{ admin_ssh_public_key }}"
      when:
        - admin_ssh_public_key is defined
        - admin_ssh_public_key != ''
        - domain.split('.')[0] != 'cpanel'

    - name: Create home directory with root ownership for SFTP chroot
      ansible.builtin.file:
        path: "/home/{{ domain }}"
        state: directory
        owner: root
        group: "{{ vhost_owner }}"
        mode: '0750'
      when: domain.split('.')[0] != 'cpanel'

    - name: Create document root directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ vhost_owner }}"
        group: "{{ vhost_owner }}"
        mode: '0770'
      with_items:
        - "{{ document_root }}"
        - "/home/{{ domain }}/logs"
        - "/home/{{ domain }}/backup"
        - "/home/{{ domain }}/tmp"
      when: domain.split('.')[0] != 'cpanel'

    - name: Create log files
      ansible.builtin.file:
        path: "/home/{{ domain }}/logs/{{ item }}"
        state: touch
        owner: nginx
        group: "{{ vhost_owner }}"
        mode: '0664'
        modification_time: preserve
        access_time: preserve
      with_items:
        - "access.log"
        - "error.log"

    - name: Set proper permissions for logs directory
      ansible.builtin.file:
        path: "/home/{{ domain }}/logs"
        owner: "{{ vhost_owner }}"
        group: "{{ vhost_owner }}"
        mode: '0770'

    - name: Set proper permissions for tmp directory
      ansible.builtin.file:
        path: "/home/{{ domain }}/tmp"
        owner: "{{ vhost_owner }}"
        mode: '0755'
        group: "{{ vhost_owner }}"
        recurse: true

    - name: Configure PHP-FPM pool
      ansible.builtin.template:
        src: "{{ playbook_dir | dirname }}/templates/php/pool.conf.j2"
        dest: "/etc/php-fpm.d/{{ domain | replace('.', '_') }}.conf"
        owner: root
        group: root
      notify: Restart PHP-FPM

    - name: Ensure nginx sites-available directory exists
      ansible.builtin.file:
        path: /etc/nginx/sites-available
        state: directory
        owner: root
        group: root

    - name: Ensure nginx sites-enabled directory exists
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled
        state: directory
        owner: root
        group: root

    - name: Configure Nginx virtual host
      ansible.builtin.template:
        src: "{{ playbook_dir | dirname }}/templates/nginx/vhost.conf.j2"
        dest: "/etc/nginx/sites-available/{{ domain }}.conf"
        owner: root
        group: root
      vars:
        nginx_ssl_enabled: false
      notify: Restart Nginx

    - name: Enable site by creating symlink
      ansible.builtin.file:
        src: "/etc/nginx/sites-available/{{ domain }}.conf"
        dest: "/etc/nginx/sites-enabled/{{ domain }}.conf"
        state: link
      notify: Restart Nginx

    - name: Create index.html from template
      ansible.builtin.template:
        src: "{{ playbook_dir | dirname }}/templates/website/index.html.j2"
        dest: "{{ document_root }}/index.html"
        owner: "{{ vhost_owner }}"
        group: "{{ vhost_owner }}"
        mode: '0664'
        force: true

    - name: Set persistent SELinux context policy for vhost home (covers all subdirs)
      ansible.builtin.command: >
        semanage fcontext -a -t httpd_user_content_t '/home/{{ domain }}(/.*)?'
      when: ansible_selinux.status == "enabled"
      changed_when: false
      failed_when: false

    - name: Set persistent SELinux context policy for log directory
      ansible.builtin.command: >
        semanage fcontext -a -t httpd_log_t '/home/{{ domain }}/logs(/.*)?'
      when: ansible_selinux.status == "enabled"
      changed_when: false
      failed_when: false

    - name: Apply SELinux contexts to entire vhost home
      ansible.builtin.command: restorecon -R /home/{{ domain }}
      when: ansible_selinux.status == "enabled"
      changed_when: false

    - name: Find PHP files in document root
      ansible.builtin.find:
        paths: "{{ document_root }}"
        patterns: "*.php"
        file_type: file
        recurse: true
      register: php_files

    - name: Set permissions for PHP files
      ansible.builtin.file:
        path: "{{ item.path }}"
        mode: '0640'
      loop: "{{ php_files.files }}"

    - name: Find non-PHP files in document root
      ansible.builtin.find:
        paths: "{{ document_root }}"
        file_type: file
        recurse: true
        excludes: "*.php"
      register: non_php_files

    - name: Set permissions for non-PHP files
      ansible.builtin.file:
        path: "{{ item.path }}"
        mode: '0755'
      loop: "{{ non_php_files.files }}"

    - name: Create SFTP group if it doesn't exist
      ansible.builtin.group:
        name: "{{ sftp_group }}"
        gid: 222
        state: present
      when: domain == master_domain

    - name: Configure SSH for SFTP
      ansible.builtin.blockinfile:
        path: /etc/ssh/sshd_config
        insertafter: EOF
        block: |
          Match Group {{ sftp_group }}
          ForceCommand internal-sftp -u 0002
          PasswordAuthentication yes
          PermitTunnel no
          AllowAgentForwarding no
          AllowTcpForwarding no
          X11Forwarding no
        marker: "# {mark} ANSIBLE MANAGED SFTP CONFIGURATION"
      notify: Restart SSH
      when: domain == master_domain

    - name: Add user to SFTP group
      ansible.builtin.user:
        name: "{{ user }}"
        groups: "{{ sftp_group }}"
        append: true
      when: domain.split('.')[0] != 'cpanel'

    - name: Configure per-user SFTP chroot in SSH
      ansible.builtin.blockinfile:
        path: /etc/ssh/sshd_config
        insertafter: EOF
        block: |
          Match User {{ user }}
          ChrootDirectory /home/{{ domain }}
        marker: "# {mark} ANSIBLE MANAGED SFTP CHROOT {{ domain }}"
      notify: Restart SSH
      when: domain.split('.')[0] != 'cpanel'

    - name: Configure hosts file for master domain
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ item }}"
        state: present
      with_items:
        - "127.0.0.1 localhost.localdomain localhost"
        - "{{ ansible_default_ipv4.address }} {{ domain }} www.{{ domain }}"
        - "{{ ansible_default_ipv4.address }} mail.{{ domain }}"
        - "{{ ansible_default_ipv4.address }} cpanel.{{ domain }}"
      when: domain == master_domain

    - name: Configure hosts file for regular domain
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ ansible_default_ipv4.address }} {{ domain }} www.{{ domain }}"
        state: present
      when: domain != master_domain

    - name: Configure mail subdomain if this is the master domain
      block:
        - name: Create mail subdomain configuration
          ansible.builtin.template:
            src: "{{ playbook_dir | dirname }}/roles/mail/templates/nginx/mail.conf.j2"
            dest: "/etc/nginx/sites-available/{{ mail_subdomain }}.conf"
            owner: root
            group: root
          notify: Restart Nginx

        - name: Enable mail subdomain site
          ansible.builtin.file:
            src: "/etc/nginx/sites-available/{{ mail_subdomain }}.conf"
            dest: "/etc/nginx/sites-enabled/{{ mail_subdomain }}.conf"
            state: link
          notify: Restart Nginx

        - name: Create mail subdomain directories
          ansible.builtin.file:
            path: "/var/vmail/{{ domain }}"
            state: directory
            owner: "{{ mail_user | default('vmail') }}"
            group: "{{ mail_group | default('vmail') }}"
            recurse: true
      when: domain == master_domain

    - name: Configure Postfix for regular domain
      when: domain != master_domain
      block:
        - name: Add domain to mail database
          community.mysql.mysql_query:
            login_db: "{{ mail_db_name }}"
            login_user: "{{ mail_db_user }}"
            login_password: "{{ mail_db_password }}"
            login_unix_socket: "{{ db_login_unix_socket | default(omit) }}"
            query: "INSERT IGNORE INTO domains (domain) VALUES (%s)"
            positional_args:
              - "{{ domain }}"
          changed_when: true

        - name: Create individual mailboxes in database
          community.mysql.mysql_query:
            login_db: "{{ mail_db_name }}"
            login_user: "{{ mail_db_user }}"
            login_password: "{{ mail_db_password }}"
            login_unix_socket: "{{ db_login_unix_socket | default(omit) }}"
            query: "INSERT IGNORE INTO users (email, password, domain) VALUES (%s, %s, %s)"
            positional_args:
              - "{{ item }}@{{ domain }}"
              - "{{ vault_mail_default_password | password_hash('sha512') }}"
              - "{{ domain }}"
          with_items:
            - "contact"
            - "support"
            - "no-reply"
            - "copyright"
            - "privacy"
          changed_when: true

        - name: Create mailbox directories
          ansible.builtin.file:
            path: "/var/vmail/{{ domain }}/{{ item }}"
            state: directory
            owner: "{{ mail_user }}"
            group: "{{ mail_group }}"
            recurse: true
          with_items:
            - "contact"
            - "support"
            - "no-reply"
            - "copyright"
            - "privacy"

    - name: Configure OpenDKIM for regular domain
      when: domain != master_domain
      block:
        - name: Create OpenDKIM directory for domain
          ansible.builtin.file:
            path: "/etc/opendkim/keys/{{ domain }}"
            state: directory
            mode: '0700'

        - name: Generate OpenDKIM keys
          ansible.builtin.command:
            argv:
              - opendkim-genkey
              - -r
              - -b
              - "2048"
              - -d
              - "{{ domain }}"
            chdir: "/etc/opendkim/keys/{{ domain }}"
            creates: "/etc/opendkim/keys/{{ domain }}/default.private"

        - name: Set permissions for OpenDKIM directory
          ansible.builtin.file:
            path: "/etc/opendkim/keys/{{ domain }}"
            mode: '0700'
            recurse: true

        - name: Set permissions for OpenDKIM key files
          ansible.builtin.file:
            path: "/etc/opendkim/keys/{{ domain }}/{{ item }}"
            mode: '0600'
          with_fileglob:
            - "/etc/opendkim/keys/{{ domain }}/*"

        - name: Add domain to OpenDKIM KeyTable
          ansible.builtin.lineinfile:
            path: /etc/opendkim/KeyTable
            line: "default._domainkey.{{ domain }} {{ domain }}:default:/etc/opendkim/keys/{{ domain }}/default.private"
            state: present
            create: true
            mode: '0644'

        - name: Add domain to OpenDKIM SigningTable
          ansible.builtin.lineinfile:
            path: /etc/opendkim/SigningTable
            line: "*@{{ domain }} default._domainkey.{{ domain }}"
            state: present
            create: true
            mode: '0644'

        - name: Reload mail services
          ansible.builtin.service:
            name: "{{ item }}"
            state: reloaded
          with_items:
            - postfix
            - dovecot
            - opendkim

  handlers:
    - name: Restart Nginx
      ansible.builtin.service:
        name: nginx
        state: restarted

    - name: Restart PHP-FPM
      ansible.builtin.service:
        name: php-fpm.service
        state: restarted

    - name: Restart SSH
      ansible.builtin.service:
        name: sshd
        state: restarted
