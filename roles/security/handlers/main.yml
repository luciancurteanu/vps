# Security role: Handlers

- name: restart iptables
  ansible.builtin.service:
    name: iptables
    state: restarted
  when: ansible_virtualization_type | default('') != 'docker'

- name: restart ip6tables
  ansible.builtin.service:
    name: ip6tables
    state: restarted
  when: ansible_virtualization_type | default('') != 'docker'

- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: restart fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: restarted

- name: restart ssh
  ansible.builtin.service:
    name: sshd
    state: restarted
  when: ansible_virtualization_type | default('') != 'docker'
