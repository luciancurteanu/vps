---
# Mail role: Default variables

# Mail domain settings
mail_domain: "{{ domain }}"
mail_subdomain: "mail.{{ domain }}"
mail_hostname: "{{ mail_subdomain }}"

# Email administrator contact info
mail_admin_email: "contact@{{ domain }}"
postmaster_email: "noreply@{{ domain }}"

# Database settings for mail services
mail_db_name: "mailserver"
mail_db_user: "mailuser"
mail_db_password: "{{ vault_mail_db_password | default(lookup('env', 'MAIL_DB_PASSWORD'), true) }}"
db_root_user: root
db_root_password: "{{ vault_db_root_password | default(lookup('env', 'MARIADB_ROOT_PASSWORD'), true) }}"
db_login_unix_socket: /var/lib/mysql/mysql.sock

# Webmail settings
# webmail_version is defined in inventory/group_vars/all.yml
webmail_path: "/home/{{ master_domain | default(domain) }}/roundcube"

# Roundcube database settings
roundcube_db_name: "roundcube"
roundcube_db_user: "roundcube"
roundcube_db_password: "{{ vault_roundcube_db_password | default(lookup('env', 'ROUNDCUBE_DB_PASSWORD'), true) }}"

# Mail system users
mail_user: "vmail"
mail_group: "vmail"
mail_uid: 5000
mail_gid: 5000
# Home directory for the mail system user. Use /var/vmail to avoid creating homes under /home
mail_home: "/var/vmail"
mail_enable_opendkim: true   # Requires CRB repo (enabled automatically in opendkim.yml)
mail_enable_roundcube: true   # Enabled: Roundcube webmail installation
mail_enable_nginx: true
# Use /var/vmail for virtual mail storage by default
mail_use_var_vmail: true

# Postfix TLS certificate paths
# Set mail_use_letsencrypt: true in inventory/group_vars when Let's Encrypt certs are available.
# When false (default), a self-signed cert is auto-generated under mail_ssl_dir.
mail_use_letsencrypt: false
mail_ssl_dir: "/etc/ssl/local/{{ domain }}"
mail_ssl_enabled: true   # Keep IMAPS/POP3S available; cert files come from system PKI or local self-signed paths
mail_ssl_cert: ""  # Leave blank by default; set per-inventory or ensure system PKI at /etc/pki/dovecot/
mail_ssl_key: ""   # Leave blank by default
mail_ssl_ca: ""    # Leave blank by default

# Service-specific defaults (can be overridden per-inventory)
# Dovecot: use system PKI by default
dovecot_cert: "/etc/pki/dovecot/certs/dovecot.pem"
dovecot_key:  "/etc/pki/dovecot/private/dovecot.pem"
dovecot_ca:   "/etc/pki/dovecot/certs/ca.pem"

# Postfix: service-specific locations (recommended via deploy-hook copy)
postfix_cert: "{{ mail_ssl_dir }}/server.crt"
postfix_key:  "{{ mail_ssl_dir }}/server.key"
postfix_ca:   "{{ mail_ssl_dir }}/ca.crt"
