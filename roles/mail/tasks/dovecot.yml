---
# Dovecot configuration tasks (simplified)

- name: Install Dovecot packages
  ansible.builtin.package:
    name:
      - dovecot
      - dovecot-mysql
      - dovecot-pigeonhole
    state: present

- name: Create Dovecot directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: dovecot
    group: dovecot
  loop:
    - /etc/dovecot/conf.d

- name: Ensure system Dovecot TLS cert exists
  ansible.builtin.stat:
    path: /etc/pki/dovecot/certs/dovecot.pem
  register: dovecot_system_cert

- name: Ensure system Dovecot TLS key exists
  ansible.builtin.stat:
    path: /etc/pki/dovecot/private/dovecot.pem
  register: dovecot_system_key

- name: Ensure optional Dovecot CA exists
  ansible.builtin.stat:
    path: /etc/pki/dovecot/certs/ca.pem
  register: dovecot_system_ca

- name: Fail if Dovecot cert or key missing
  ansible.builtin.fail:
    msg: "Dovecot TLS cert or key missing at /etc/pki/dovecot. Ensure /etc/pki/dovecot/certs/dovecot.pem and /etc/pki/dovecot/private/dovecot.pem exist."
  when: not (dovecot_system_cert.stat.exists and dovecot_system_key.stat.exists)

- name: Backup Dovecot SSL config
  ansible.builtin.copy:
    src: /etc/dovecot/conf.d/10-ssl.conf
    dest: /etc/dovecot/conf.d/10-ssl.conf.bak
    remote_src: true
    mode: '0644'
    force: false
  failed_when: false

- name: Deploy simplified Dovecot SSL config
  ansible.builtin.template:
    src: dovecot/conf.d/10-ssl.conf.j2
    dest: /etc/dovecot/conf.d/10-ssl.conf
    owner: root
    group: root
  notify: restart dovecot

- name: Configure Dovecot main configuration
  ansible.builtin.template:
    src: dovecot/dovecot.conf.j2
    dest: /etc/dovecot/dovecot.conf
    owner: root
    group: root
  notify: restart dovecot

- name: Configure Dovecot authentication
  ansible.builtin.template:
    src: dovecot/conf.d/10-auth.conf.j2
    dest: /etc/dovecot/conf.d/10-auth.conf
    owner: root
    group: root
  notify: restart dovecot

- name: Ensure Dovecot service is running and enabled
  ansible.builtin.systemd:
    name: dovecot
    state: started
    enabled: true
  register: dovecot_service
  failed_when: false

- name: Show Dovecot status on failure
  ansible.builtin.command: systemctl status dovecot --no-pager
  register: dovecot_status
  changed_when: false
  failed_when: false
  when: dovecot_service is failed or dovecot_service.rc | default(0) != 0
